name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y libsndfile1 espeak-ng
      - name: Install package and deterministic CI tooling
        run: |
          python -m pip install -e '.[dev]'
          python -m pip install 'ruff==0.15.22'
      - run: python -m ruff check --no-cache .
      - run: python -m ruff format --check --no-cache .
      - run: mypy
      - run: python scripts/validate_docs.py
      - run: pytest --cov=tts_pipeline --cov-report=xml
